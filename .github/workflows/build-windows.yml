name: Build Windows EXE

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Install UPX (for smaller exe)
        run: choco install upx -y --no-progress
        shell: pwsh

      - name: Generate icon.ico from icon.png
        run: python tools/make_icon.py
        continue-on-error: true

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest -q

      - name: Build LizardPDF.exe
        run: pyinstaller build.spec

      - name: Report exe size
        run: |
          $f = Get-Item dist/LizardPDF.exe
          "LizardPDF.exe = {0:N1} MB" -f ($f.Length / 1MB)
        shell: pwsh

      - name: Report largest bundled files
        run: |
          if (Test-Path build/LizardPDF) {
            Get-ChildItem build/LizardPDF -Recurse -File |
              Sort-Object Length -Descending |
              Select-Object -First 30 @{Name="SizeMB";Expression={"{0:N2}" -f ($_.Length / 1MB)}}, FullName |
              Format-Table -AutoSize
          } else {
            "No build/LizardPDF analysis directory found."
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LizardPDF-windows
          path: dist/LizardPDF.exe
          if-no-files-found: error
